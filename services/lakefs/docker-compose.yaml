services:
  postgres:
    image: postgres:13
    container_name: lakefs-postgres
    environment:
      POSTGRES_USER: ${LAKEFS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${LAKEFS_POSTGRES_PASSWORD}
      POSTGRES_DB: ${LAKEFS_POSTGRES_DB}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LAKEFS_POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5435:5432"
    networks:
      - lakefs-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: lakefs-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakefs-network
    restart: unless-stopped

  create-bucket:
    image: minio/mc:latest
    container_name: lakefs-create-bucket
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc config host add myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb myminio/${LAKEFS_BLOCKSTORE_S3_BUCKET_NAME};
      /usr/bin/mc policy set public myminio/${LAKEFS_BLOCKSTORE_S3_BUCKET_NAME};
      echo 'Bucket created successfully';
      "
    networks:
      - lakefs-network
    restart: "no"

  lakefs:
    image: treeverse/lakefs:0.106.0
    container_name: lakefs-server
    depends_on:
      postgres:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
    environment:
      # Настройки базы данных
      - LAKEFS_DATABASE_TYPE=postgres
      - LAKEFS_DATABASE_POSTGRES_CONNECTION_STRING=postgres://${LAKEFS_POSTGRES_USER}:${LAKEFS_POSTGRES_PASSWORD}@postgres:5432/${LAKEFS_POSTGRES_DB}?sslmode=disable

      # Настройки аутентификации
      - LAKEFS_AUTH_ENCRYPT_SECRET_KEY=${LAKEFS_AUTH_ENCRYPT_SECRET_KEY}

      # Настройки блокстора (S3/MinIO)
      - LAKEFS_BLOCKSTORE_TYPE=${LAKEFS_BLOCKSTORE_TYPE}
      - LAKEFS_BLOCKSTORE_S3_ENDPOINT=${LAKEFS_BLOCKSTORE_S3_ENDPOINT}
      - LAKEFS_BLOCKSTORE_S3_FORCE_PATH_STYLE=${LAKEFS_BLOCKSTORE_S3_FORCE_PATH_STYLE}
      - LAKEFS_BLOCKSTORE_S3_CREDENTIALS_ACCESS_KEY_ID=${LAKEFS_BLOCKSTORE_S3_CREDENTIALS_ACCESS_KEY_ID}
      - LAKEFS_BLOCKSTORE_S3_CREDENTIALS_SECRET_ACCESS_KEY=${LAKEFS_BLOCKSTORE_S3_CREDENTIALS_SECRET_ACCESS_KEY}
      - LAKEFS_BLOCKSTORE_S3_BUCKET_NAME=${LAKEFS_BLOCKSTORE_S3_BUCKET_NAME}
      - LAKEFS_BLOCKSTORE_S3_REGION=us-east-1

      # Дополнительные настройки
      - LAKEFS_LOGGING_LEVEL=DEBUG
      - LAKEFS_STATS_ENABLED=false
      - LAKEFS_INSTALLATION_USER_NAME=${LAKEFS_INITIAL_USER_NAME}
      - LAKEFS_INSTALLATION_USER_PASSWORD=${LAKEFS_INITIAL_USER_PASSWORD}
    ports:
      - "8001:8000"
    networks:
      - lakefs-network
    restart: unless-stopped

networks:
  lakefs-network:
    driver: bridge