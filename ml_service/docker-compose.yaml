services:
  postgres:
    image: postgres:13
    container_name: ml-service-postgres
    environment:
      POSTGRES_USER: ml_user
      POSTGRES_PASSWORD: ml_pass
      POSTGRES_DB: ml_db
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ml_user"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ml-service-network
    restart: unless-stopped
  ml-service:
    build: .
    container_name: ml-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ml_user:ml_pass@postgres:5432/ml_db
      MODEL_VERSION: v1.0.0
    ports:
      - "8002:8000"
    networks:
      - ml-service-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ml_user -d ml_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  ml-service-network:
    driver: bridge
    name: ml-service-network