apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: default
  labels:
    app: ml-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
        version: v1
    spec:
      containers:
      - name: ml-service
        image: ml_service-ml-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http

        env:
        # Значение из ConfigMap (несекретные данные)
        - name: MODEL_VERSION
          valueFrom:
            configMapKeyRef:
              name: ml-service-config
              key: MODEL_VERSION

        # Значение из Secret (секретные данные - пароль к БД)
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ml-service-secret
              key: DATABASE_URL

        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        # Startup probe - проверяет, что приложение запустилось
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 30

        # Readiness probe - готов ли принимать трафик
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3

        # Liveness probe - живо ли приложение
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ml-service-config
  namespace: default
data:
  MODEL_VERSION: "v1.0.0"
  LOG_LEVEL: "INFO"
---
apiVersion: v1
kind: Secret
metadata:
  name: ml-service-secret
  namespace: default
type: Opaque
stringData:
  # stringData автоматически закодирует в base64
  DATABASE_URL: "postgresql://ml_user:ml_pass@postgres:5432/ml_db"
